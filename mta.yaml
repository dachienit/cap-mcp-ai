_schema-version: 3.3.0
ID: cap-mcp-ai
version: 1.0.0
description: "CAP MCP with AI"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: cap-mcp-ai-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    properties:
      # AI RAG Service — same pattern as OctoAgent/console/mta.yaml
      AI_URL_TOKEN: "https://login.microsoftonline.com/0ae51e19-07c8-4e4b-bb6d-648ee58410f4/oauth2/v2.0/token"
      AI_CLIENT_ID: "d02d08ba-44d3-400c-bb42-da0f63c44bab"
      AI_SCOPE: "api://dia-brain/.default"
      AI_CLIENT_SECRET: ""
      AI_GRANT_TYPE: "client_credentials"
      AI_DIA_HISTORY: "https://ews-emea.api.bosch.com/it/application/dia-brain/v1/api/chat-histories"
      AI_DIA_CHAT_RAG: "https://ews-emea.api.bosch.com/it/application/dia-brain/v1/api/chat/retrieval-augmented"
      AI_BRAIN_ID: "H0cG6uvPJ38Y"
    requires:
      - name: cap-mcp-ai-auth
      - name: cap-mcp-ai-destination
      - name: cap-mcp-ai-connectivity
  - name: cap-mcp-ai
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    build-parameters:
      builder: custom
      commands:
        - npm install --prefix ../react-ui
        - npm run build --prefix ../react-ui
        - npx -p shx shx rm -rf ./react-ui-dist
        - npx -p shx shx cp -r ../react-ui/dist ./react-ui-dist
      build-result: .
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: cap-mcp-ai-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: cap-mcp-ai-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
  - name: cap-mcp-ai-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: cap-mcp-ai-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cap-mcp-ai-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
